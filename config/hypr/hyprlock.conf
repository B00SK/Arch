background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color = rgb(624E67)
    inner_color = rgb(16101b)
    font_color = rgb(aec3bf)
    fade_on_empty = true
    placeholder_text = <i>Mot de passe...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span font_size='80pt'>$(date +"%H:%M")</span>"
    color = rgba(aec3bf, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
